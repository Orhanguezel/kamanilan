# =========================================================
# panel.kamanilan.com — Admin Panel Nginx Config
# =========================================================
server {
  listen 80;
  listen [::]:80;
  server_name panel.kamanilan.com;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/_acme-challenge;
    default_type 'text/plain';
    try_files $uri =404;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name panel.kamanilan.com;

  ssl_certificate /etc/letsencrypt/live/kamanilan.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kamanilan.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 25m;

  add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload' always;
  add_header X-Frame-Options 'SAMEORIGIN' always;
  add_header X-Content-Type-Options 'nosniff' always;
  add_header X-XSS-Protection '1; mode=block' always;
  add_header Referrer-Policy 'strict-origin-when-cross-origin' always;
  add_header Permissions-Policy 'geolocation=(), microphone=(), camera=()' always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com https://www.google.com https://accounts.google.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https: wss:; frame-src 'self' https://accounts.google.com https://www.facebook.com; frame-ancestors 'self';" always;

  location ~* ^/api/(auth|login|register|reset-password) {
    limit_req zone=login_limit burst=3 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:8097;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  location ^~ /api/ {
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:8097;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
  }

  location / {
    limit_req zone=general_limit burst=50 nodelay;
    proxy_pass http://127.0.0.1:3061;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
  }

  location ~ /\.(?!well-known).* {
    deny all;
  }
}
