<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340">
  <!--
    Murat Meşe — Hızar & Bahçe Hizmetleri
    Banner illustration (sağ taraf, 210×170 slot)
    object-contain object-right-bottom ile gösterilir
    Arka plan: şeffaf (#F0FDF4 kart rengine karışır)
  -->
  <defs>
    <linearGradient id="logBody1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A07848"/>
      <stop offset="100%" stop-color="#7A5030"/>
    </linearGradient>
    <linearGradient id="logBody2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9A7040"/>
      <stop offset="100%" stop-color="#6B3E22"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#16A34A" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- ── Zemin şeridi ── -->
  <ellipse cx="210" cy="325" rx="260" ry="30" fill="#22C55E" opacity="0.18"/>
  <rect x="0" y="298" width="420" height="42" fill="#15803D" opacity="0.15"/>

  <!-- ── Ağaç 1 — sol, ince & uzun ── -->
  <g opacity="0.92">
    <polygon points="52,308 90,100 128,308" fill="#14532D"/>
    <polygon points="60,272 90,80 120,272" fill="#166534"/>
    <polygon points="68,242 90,60 112,242" fill="#15803D"/>
    <polygon points="75,216 90,44 105,216" fill="#16A34A"/>
    <rect x="84" y="305" width="12" height="20" fill="#7C2D12" rx="1"/>
  </g>

  <!-- ── Ağaç 2 — orta-sol, daha kısa ── -->
  <g opacity="0.80">
    <polygon points="140,308 170,165 200,308" fill="#14532D"/>
    <polygon points="148,278 170,142 192,278" fill="#166534"/>
    <polygon points="155,253 170,122 185,253" fill="#15803D"/>
    <rect x="164" y="305" width="12" height="18" fill="#7C2D12" rx="1"/>
  </g>

  <!-- ── Ağaç 3 — sağ arka, küçük & soluk ── -->
  <g opacity="0.55">
    <polygon points="340,308 365,195 390,308" fill="#14532D"/>
    <polygon points="347,282 365,175 383,282" fill="#166534"/>
    <rect x="359" y="305" width="12" height="16" fill="#7C2D12" rx="1"/>
  </g>

  <!-- ── Kütük yığını ── -->
  <!-- Alt kütük (büyük) -->
  <ellipse cx="255" cy="278" rx="52" ry="20" fill="#6B3E22"/>
  <rect x="203" y="228" width="104" height="52" fill="url(#logBody1)"/>
  <ellipse cx="255" cy="228" rx="52" ry="20" fill="#C4906A"/>
  <!-- Yıllık halkalar -->
  <ellipse cx="255" cy="228" rx="43" ry="16" fill="none" stroke="#9A6A40" stroke-width="2"/>
  <ellipse cx="255" cy="228" rx="30" ry="11" fill="none" stroke="#8A5A30" stroke-width="1.5"/>
  <ellipse cx="255" cy="228" rx="17" ry="6"  fill="none" stroke="#7A4A22" stroke-width="1.5"/>
  <ellipse cx="255" cy="228" rx="7"  ry="2.5" fill="none" stroke="#6A3A15" stroke-width="1"/>
  <circle  cx="255" cy="228" r="2.5" fill="#5A2E10"/>

  <!-- Üst kütük (biraz sağa kaymış) -->
  <ellipse cx="268" cy="224" rx="44" ry="17" fill="#6B3E22"/>
  <rect x="224" y="175" width="88" height="51" fill="url(#logBody2)"/>
  <ellipse cx="268" cy="175" rx="44" ry="17" fill="#B8845A"/>
  <ellipse cx="268" cy="175" rx="36" ry="13" fill="none" stroke="#9A6440" stroke-width="2"/>
  <ellipse cx="268" cy="175" rx="24" ry="9"  fill="none" stroke="#8A5430" stroke-width="1.5"/>
  <ellipse cx="268" cy="175" rx="12" ry="4.5" fill="none" stroke="#7A4420" stroke-width="1"/>
  <circle  cx="268" cy="175" r="2" fill="#5A2E10"/>

  <!-- Yana dönmüş küçük kütük -->
  <ellipse cx="195" cy="268" rx="30" ry="12" fill="#6B3E22"/>
  <rect x="165" y="230" width="60" height="40" fill="#9A6840"/>
  <ellipse cx="195" cy="230" rx="30" ry="12" fill="#B07848"/>
  <ellipse cx="195" cy="230" rx="24" ry="9"  fill="none" stroke="#8A5830" stroke-width="1.5"/>
  <ellipse cx="195" cy="230" rx="13" ry="5"  fill="none" stroke="#7A4820" stroke-width="1"/>

  <!-- ── Talaş / Odun kırıntısı ── -->
  <ellipse cx="235" cy="295" rx="28" ry="7" fill="#A07040" opacity="0.40"/>
  <circle cx="222" cy="293" r="2"   fill="#8B5E3C" opacity="0.6"/>
  <circle cx="238" cy="291" r="1.5" fill="#9A6840" opacity="0.55"/>
  <circle cx="248" cy="294" r="2"   fill="#8B5E3C" opacity="0.5"/>

  <!-- ── Motorlu Testere (sol-alt, eğik) ── -->
  <g transform="translate(82,250) rotate(-30)">
    <!-- Bıçak (bar) -->
    <rect x="-68" y="9" width="74" height="13" fill="#374151" rx="2"/>
    <ellipse cx="-68" cy="15.5" rx="9" ry="7.5" fill="#374151"/>
    <!-- Zincir dişleri -->
    <rect x="-64" y="7.5" width="5" height="4" fill="#6B7280" rx="0.5"/>
    <rect x="-52" y="7.5" width="5" height="4" fill="#6B7280" rx="0.5"/>
    <rect x="-40" y="7.5" width="5" height="4" fill="#6B7280" rx="0.5"/>
    <rect x="-28" y="7.5" width="5" height="4" fill="#6B7280" rx="0.5"/>
    <rect x="-16" y="7.5" width="5" height="4" fill="#6B7280" rx="0.5"/>
    <rect x=" -4" y="7.5" width="5" height="4" fill="#6B7280" rx="0.5"/>
    <!-- Ana gövde -->
    <rect x="0" y="0" width="88" height="31" fill="#D97706" rx="5"/>
    <!-- Motor bloğu -->
    <rect x="64" y="-6" width="34" height="43" fill="#92400E" rx="3"/>
    <!-- Tutma kolları -->
    <rect x="12" y="-13" width="11" height="16" fill="#B45309" rx="2"/>
    <rect x="58" y="-11" width="11" height="13" fill="#B45309" rx="2"/>
    <!-- Dişli -->
    <circle cx="98" cy="15.5" r="14" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
    <circle cx="98" cy="15.5" r="7"  fill="#374151"/>
    <!-- Yakıt kapağı -->
    <circle cx="74"  cy="4" r="4.5" fill="#78350F"/>
    <circle cx="74"  cy="4" r="2"   fill="#92400E"/>
  </g>

  <!-- ── Çapa (sağ taraf, yaslanmış) ── -->
  <g transform="translate(358,128) rotate(10)">
    <!-- Sap -->
    <rect x="-4" y="-10" width="8" height="155" fill="#92400E" rx="3"/>
    <!-- Sap üst kap -->
    <ellipse cx="0" cy="-10" rx="5" ry="3.5" fill="#7C2D12"/>
    <!-- Başlık (metal yatay) -->
    <rect x="-24" y="130" width="52" height="11" fill="#9CA3AF" rx="2.5"/>
    <!-- Orta diş -->
    <rect x="-6"  y="118" width="12" height="25" fill="#6B7280" rx="1.5"/>
    <!-- Yan dişler (opsiyonel) -->
    <rect x="-20" y="121" width="9" height="18" fill="#6B7280" rx="1"/>
    <rect x=" 11" y="121" width="9" height="18" fill="#6B7280" rx="1"/>
    <!-- Metal parlaklık -->
    <rect x="-24" y="130" width="52" height="3" fill="#D1D5DB" rx="2" opacity="0.6"/>
  </g>

  <!-- ── Ot demetleri (zemin) ── -->
  <g fill="#15803D" opacity="0.75">
    <path d="M 30 308 L 34 288 L 38 308"/>
    <path d="M 40 310 L 46 292 L 52 310"/>
    <path d="M 155 306 L 159 289 L 163 306"/>
    <path d="M 395 308 L 399 291 L 403 308"/>
    <path d="M 408 310 L 412 295 L 416 310"/>
  </g>
</svg>
